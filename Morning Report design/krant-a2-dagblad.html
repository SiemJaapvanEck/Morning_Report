<style>
  :root{
    --accent:#2f6df0; --accent-deep:#1f57d6; --accent-tint:#eef3fe;
    --map-bg:#f5f4f1; --map-ocean:rgba(28,25,23,0.07); --map-land:rgba(28,25,23,0.12); --util-bg:rgba(247,246,243,.9);
    --bg:#f7f6f3; --paper:#ffffff;
    --ink:#1c1917; --ink2:#292524; --muted:#57534e; --faint:#a8a29e;
    --line:#e7e5e0; --line2:#efedea; --hatch:#ece9e3;
    --emer-t:#0f7a4f; --emer-b:#d8f0e2;
    --amber-t:#9a6b15; --amber-b:#f6eccf;
    --stone-t:#78716c; --stone-b:#eceae6;
    --rose:#e0364f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'Space Mono',monospace;}
  .arch{font-family:'Archivo',sans-serif;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1200px;margin:0 auto;padding:0 40px;}
  .col{max-width:720px;}

  /* ── utility bar ── */
  .util{position:sticky;top:0;z-index:20;background:var(--util-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .util-in{max-width:1680px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:14px 40px;}
  .back{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:13.5px;}
  .back svg{transition:transform .15s;}.back:hover svg{transform:translateX(-4px);}
  .util .nm{flex:1;text-align:center;font-family:'Archivo';font-weight:800;letter-spacing:.04em;font-size:14px;}
  .util .ed{font-family:'Space Mono';font-size:11.5px;color:var(--muted);letter-spacing:.06em;}

  /* ── masthead band (daily-paper header) ── */
  .mast{border-bottom:2px solid var(--ink);}
  .mast-in{max-width:1680px;margin:0 auto;padding:32px 40px 24px;display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;}
  .mast-in h1{font-family:'Archivo';font-weight:900;font-size:64px;letter-spacing:-.04em;line-height:.85;margin:0;}
  .mast-in .meta{font-family:'Space Mono';font-size:12px;color:var(--muted);letter-spacing:.04em;line-height:1.7;}
  .mast-in .meta b{color:var(--ink);}
  .mast-in .spacer{flex:1;}
  .wxbar{display:flex;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper);}
  .wxbar .s{padding:9px 16px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:2px;}
  .wxbar .s:last-child{border-right:none;}
  .wxbar .v{font-family:'Archivo';font-weight:700;font-size:15px;}
  .wxbar .k{font-family:'Space Mono';font-size:10px;color:var(--faint);letter-spacing:.04em;}

  /* ── top zone: sol + data tiles (full width) ── */
  .topzone{display:grid;grid-template-columns:minmax(0,1fr) 400px;gap:20px;padding:0 40px;max-width:1680px;margin:34px auto 0;align-items:stretch;}
  .sol{background:var(--accent);color:#fff;border-radius:18px;padding:30px 34px;position:relative;overflow:hidden;}
  .sol::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 100% 0,rgba(255,255,255,.12),transparent 55%);pointer-events:none;}
  .sol .h{display:flex;align-items:center;gap:11px;font-family:'Space Mono';font-size:12px;letter-spacing:.16em;font-weight:700;}
  .sol .h .star{width:18px;height:18px;display:inline-flex;}
  .sol p{font-size:19px;line-height:1.55;margin:15px 0 0;position:relative;z-index:1;}
  .data{display:flex;flex-direction:column;gap:16px;}
  .tile{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
  .tile .th{display:flex;align-items:center;justify-content:space-between;font-family:'Space Mono';font-size:11px;letter-spacing:.14em;color:var(--muted);margin-bottom:13px;}
  .mk{display:grid;grid-template-columns:1fr 1fr;gap:9px 22px;}
  .mk .row{display:flex;align-items:center;gap:8px;}
  .mk .nm{font-family:'Space Mono';font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mk .pc{font-family:'Space Mono';font-weight:700;font-size:12.5px;}
  .mk .up{color:var(--emer-t);}.mk .dn{color:var(--rose);}
  .rg .row{display:grid;grid-template-columns:104px 1fr 28px;gap:9px;align-items:center;margin:6px 0;}
  .rg .nm{font-family:'Space Mono';font-size:11.5px;color:var(--muted);white-space:nowrap;}
  .rg .bar{height:8px;border-radius:4px;background:var(--accent);}
  .rg .n{font-family:'Space Mono';font-size:11.5px;font-weight:700;text-align:right;}
  @media(max-width:1080px){ .topzone{grid-template-columns:1fr;} }

  /* ── section divider ── */
  .secdiv{display:flex;align-items:baseline;gap:18px;margin:0;padding:54px 0 0;}
  .secdiv .nm{font-family:'Archivo';font-weight:900;font-size:42px;letter-spacing:-.03em;}
  .secdiv .ln{flex:1;height:2px;background:var(--ink);transform:translateY(-8px);}
  .secdiv .ct{font-family:'Space Mono';font-size:12px;color:var(--muted);letter-spacing:.04em;white-space:nowrap;transform:translateY(-6px);}
  .secsum{margin:10px 0 0;padding:0;}
  .secsum p{font-size:16.5px;color:var(--muted);line-height:1.5;max-width:78ch;margin:0;}

  /* ── lead story ── */
  .lead{margin:40px 0 0;padding:0;}
  .leadtag{display:inline-flex;align-items:center;gap:10px;font-family:'Space Mono';font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
  .leadtag .pct{background:var(--accent);color:#fff;border-radius:6px;padding:3px 8px;letter-spacing:.04em;}
  .lead h2{font-family:'Archivo';font-weight:800;font-size:58px;line-height:1.0;letter-spacing:-.03em;margin:16px 0 0;max-width:20ch;text-wrap:balance;}
  .lead-hero{margin:28px 0 0;}
  .lead-hero image-slot{width:100%;height:520px;display:block;border-radius:18px;overflow:hidden;}
  .lead-grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:54px;margin:34px 0 0;align-items:start;}

  .article p{font-size:20px;line-height:1.62;color:var(--ink2);margin:0 0 24px;}
  .article.lead-body p:first-child::first-letter{font-family:'Archivo';font-weight:900;font-size:78px;line-height:.72;float:left;padding:6px 14px 0 0;color:var(--ink);}

  /* verhaallijn ribbon */
  .thread{display:flex;align-items:stretch;gap:0;border:1.5px solid var(--accent);border-radius:12px;overflow:hidden;margin:0 0 22px;}
  .thread .deel{background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;font-size:12px;letter-spacing:.06em;padding:12px 15px;display:flex;flex-direction:column;justify-content:center;align-items:center;line-height:1.2;white-space:nowrap;}
  .thread .deel b{font-family:'Archivo';font-size:22px;font-weight:900;}
  .thread .desc{padding:11px 16px;display:flex;flex-direction:column;justify-content:center;}
  .thread .desc .lab{font-family:'Space Mono';font-size:10px;letter-spacing:.16em;color:var(--accent);font-weight:700;}
  .thread .desc .tt{font-size:14px;font-weight:600;line-height:1.3;margin-top:3px;color:var(--ink);}

  /* ripples */
  .ripples{margin:6px 0 26px;border-top:1px solid var(--line);}
  .ripple{display:grid;grid-template-columns:30px 1fr;gap:16px;padding:18px 0;border-bottom:1px solid var(--line);}
  .ripple .rn{font-family:'Space Mono';font-size:12px;color:var(--accent);font-weight:700;padding-top:3px;}
  .ripple .rl{font-family:'Archivo';font-weight:700;font-size:16px;letter-spacing:-.01em;}
  .ripple .rt{font-size:14.5px;line-height:1.5;color:var(--muted);margin-top:5px;}
  .ripples-h{display:flex;align-items:center;gap:9px;font-family:'Space Mono';font-size:11px;letter-spacing:.16em;color:var(--faint);margin:0 0 2px;padding-top:20px;}

  /* vooruitblik feature card */
  .vooruit{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;margin:0 0 26px;background:var(--paper);}
  .vooruit .top{display:flex;align-items:center;gap:10px;padding:13px 18px;background:var(--ink);color:#fff;}
  .vooruit .top .ic{width:17px;height:17px;display:inline-flex;}
  .vooruit .top .ti{font-family:'Space Mono';font-size:12px;letter-spacing:.14em;font-weight:700;}
  .vooruit .top .dt{margin-left:auto;font-family:'Space Mono';font-size:12px;color:rgba(255,255,255,.75);}
  .vooruit .bd{padding:16px 18px 17px;display:flex;gap:14px;align-items:flex-start;}
  .vooruit .bd p{font-size:15.5px;line-height:1.46;margin:0;color:var(--ink2);flex:1;}
  .certchip{font-family:'Space Mono';font-size:10.5px;font-weight:700;letter-spacing:.08em;padding:5px 10px;border-radius:999px;white-space:nowrap;text-transform:uppercase;flex:0 0 auto;}
  .cert-bevestigd{color:var(--emer-t);background:var(--emer-b);}
  .cert-verwacht{color:var(--amber-t);background:var(--amber-b);}
  .cert-gerucht{color:var(--stone-t);background:var(--stone-b);}

  /* meta + rating */
  .ameta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-family:'Space Mono';font-size:12px;color:var(--muted);margin:0 0 22px;}
  .ameta .src{color:var(--ink);font-weight:700;}
  .ameta .dot{width:4px;height:4px;border-radius:50%;background:var(--faint);}
  .rating{display:inline-flex;align-items:center;gap:9px;}
  .rating .rl{font-family:'Space Mono';font-size:10.5px;letter-spacing:.1em;color:var(--faint);}
  .rating .seg{display:flex;gap:4px;}
  .rating .seg b{width:18px;height:6px;border-radius:3px;background:var(--line);cursor:pointer;transition:.12s;display:block;}
  .rating .seg b:hover{background:var(--accent);}
  .rating .seg b.pos{background:var(--emer-t);}.rating .seg b.neg{background:var(--rose);}

  /* sidebar */
  .side{position:sticky;top:74px;display:flex;flex-direction:column;gap:24px;}
  .side .box{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px;}
  .side .bh{font-family:'Space Mono';font-size:11px;letter-spacing:.14em;color:var(--muted);margin:0 0 16px;}

  /* verhaallijn timeline card */
  .bh-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 6px;}
  .tl-card .bh{margin:0;}
  .dur{font-family:'Space Mono';font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--accent);background:var(--accent-tint);padding:4px 9px;border-radius:999px;white-space:nowrap;}
  .tl-stat{font-family:'Space Mono';font-size:12px;color:var(--muted);margin:0 0 18px;}
  .tl-stat b{font-family:'Archivo';font-weight:900;font-size:15px;color:var(--ink);}
  .tl{position:relative;}
  .tn{position:relative;display:grid;grid-template-columns:14px 1fr;gap:12px;padding:0 0 17px;}
  .tn:last-child{padding-bottom:0;}
  .tn::before{content:"";position:absolute;left:5px;top:14px;bottom:-3px;width:2px;background:var(--line);}
  .tn:last-child::before{display:none;}
  .tn.now::before{background:repeating-linear-gradient(to bottom,var(--accent) 0 3px,transparent 3px 7px);}
  .tdot{width:12px;height:12px;border-radius:50%;background:var(--paper);border:2.5px solid var(--line);margin-top:2px;z-index:1;}
  .tn.now .tdot{border-color:var(--accent);background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint);}
  .tn.future .tdot{border-color:var(--accent);border-style:dashed;background:var(--paper);}
  .tmeta{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .tdate{font-family:'Space Mono';font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.02em;}
  .tn.future .tdate{color:var(--accent);}
  .tlab{font-family:'Space Mono';font-size:9.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;}
  .tthread{font-size:13px;line-height:1.42;color:var(--ink2);margin-top:1px;}
  .tl .cc{align-self:flex-start;font-family:'Space Mono';font-size:9.5px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:999px;text-transform:uppercase;margin-top:1px;}

  /* impact map card */
  .map-card .bh{margin:0 0 12px;}
  .mapwrap{width:100%;aspect-ratio:46 / 22;background:var(--map-bg);border:1px solid var(--line2);border-radius:10px;padding:7px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
  .geo-chip{font-family:'Space Mono';font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-tint);padding:4px 10px;border-radius:999px;}
  .map-foot{font-family:'Space Mono';font-size:10px;color:var(--faint);letter-spacing:.04em;margin-top:11px;line-height:1.4;}

  /* summary cards */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin:34px 0 0;}
  .scard{background:var(--paper);padding:22px 24px;display:flex;flex-direction:column;}
  .scard .sh{font-family:'Archivo';font-weight:700;font-size:18px;line-height:1.18;letter-spacing:-.01em;}
  .scard .sb{font-size:14px;line-height:1.5;color:var(--muted);margin:9px 0 0;}
  .scard .ss{font-family:'Space Mono';font-size:11px;color:var(--faint);margin-top:auto;padding-top:14px;letter-spacing:.04em;}

  /* brief list */
  .brief{margin:30px 0 0;border-top:2px solid var(--ink);}
  .brief-h{display:flex;align-items:center;justify-content:space-between;padding:14px 0 4px;}
  .brief-h .t{font-family:'Archivo';font-weight:800;font-size:15px;letter-spacing:.02em;text-transform:uppercase;}
  .brief-h .c{font-family:'Space Mono';font-size:11px;color:var(--faint);}
  .brief-grid{columns:2;column-gap:40px;}
  .brief-item{break-inside:avoid;display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--line2);align-items:baseline;}
  .brief-item .bd{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:0 0 auto;transform:translateY(-2px);}
  .brief-item .bt{font-size:14.5px;line-height:1.35;}
  .brief-item .bs{font-family:'Space Mono';font-size:11px;color:var(--faint);margin-left:6px;}
  .brief-more{font-family:'Space Mono';font-size:12px;color:var(--accent);padding:14px 0 0;font-weight:700;}

  .featimg image-slot, .hatch{width:100%;height:340px;display:block;border-radius:16px;overflow:hidden;}
  .hatch{background:repeating-linear-gradient(135deg,var(--hatch),var(--hatch) 13px,var(--paper) 13px,var(--paper) 26px);border:1px solid var(--line);position:relative;}
  .hatch span{position:absolute;left:16px;bottom:14px;font-family:'Space Mono';font-size:11px;color:var(--faint);background:var(--paper);padding:5px 9px;border-radius:6px;letter-spacing:.04em;}

  .feat{margin:34px 0 0;}
  .feat h3{font-family:'Archivo';font-weight:800;font-size:34px;line-height:1.04;letter-spacing:-.02em;margin:20px 0 0;max-width:22ch;text-wrap:balance;}
  .feat-grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:54px;margin:22px 0 0;align-items:start;}

  /* ── per-category row: article · map+details · verhaallijn ── */
  .krow{max-width:1680px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:minmax(0,1fr) 340px 360px;gap:44px;align-items:start;}
  .kmain{min-width:0;display:flex;flex-direction:column;}
  .kmain .wrap{max-width:none;margin:0;padding:0;}
  .kmid{position:sticky;top:90px;align-self:start;display:flex;flex-direction:column;gap:16px;}
  .knews{position:sticky;top:90px;align-self:start;display:flex;flex-direction:column;gap:16px;}
  /* divider between topic categories */
  .krow + .krow{margin-top:40px;padding-top:44px;border-top:2px solid var(--ink);}
  .krow + .krow .secdiv{padding-top:0;}

  /* ── stretched verhaallijn rail ── */
  .vrail{background:var(--paper);border:1.5px solid var(--accent);border-radius:18px;overflow:hidden;}
  .vrail-top{background:var(--accent);color:#fff;padding:18px 20px 16px;position:relative;overflow:hidden;}
  .vrail-top::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 100% at 100% 0,rgba(255,255,255,.14),transparent 55%);pointer-events:none;}
  .vrail-lab{font-family:'Space Mono';font-size:10.5px;letter-spacing:.18em;font-weight:700;opacity:.85;}
  .vrail-th{font-family:'Archivo';font-weight:800;font-size:21px;line-height:1.12;letter-spacing:-.01em;margin:9px 0 0;position:relative;z-index:1;text-wrap:balance;}
  .vrail-stat{display:flex;gap:18px;margin:15px 0 0;position:relative;z-index:1;}
  .vrail-stat .s{display:flex;flex-direction:column;gap:1px;}
  .vrail-stat .s b{font-family:'Archivo';font-weight:900;font-size:24px;line-height:1;}
  .vrail-stat .s span{font-family:'Space Mono';font-size:10px;letter-spacing:.08em;opacity:.8;text-transform:uppercase;}

  .vtl{padding:20px 20px 22px;}
  .vn{position:relative;display:grid;grid-template-columns:14px 1fr;gap:14px;padding:0 0 20px;}
  .vn:last-child{padding-bottom:0;}
  .vn::before{content:"";position:absolute;left:6px;top:15px;bottom:-2px;width:2px;background:var(--line);}
  .vn:last-child::before{display:none;}
  .vn.now::before{background:repeating-linear-gradient(to bottom,var(--accent) 0 3px,transparent 3px 7px);}
  .vdot{width:13px;height:13px;border-radius:50%;background:var(--paper);border:2.5px solid var(--line);margin-top:2px;z-index:1;}
  .vn.now .vdot{border-color:var(--accent);background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint);}
  .vn.future .vdot{border-color:var(--accent);border-style:dashed;background:var(--paper);}
  .vmeta{min-width:0;}
  .vtop{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px;}
  .vdate{font-family:'Space Mono';font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.02em;}
  .vn.future .vdate,.vn.now .vdate{color:var(--accent);}
  .vtag{font-family:'Space Mono';font-size:9px;font-weight:700;letter-spacing:.1em;padding:3px 7px;border-radius:999px;text-transform:uppercase;}
  .vtag.deel{color:var(--accent);background:var(--accent-tint);}
  .vtag.update{color:var(--stone-t);background:var(--stone-b);}
  .vtag.analyse{color:var(--amber-t);background:var(--amber-b);}
  .vtag.now{color:#fff;background:var(--accent);}
  .vtag.vooruit{color:var(--emer-t);background:var(--emer-b);}
  .vtitle{font-size:14px;line-height:1.34;color:var(--ink2);font-weight:500;}
  .vn.now .vtitle{font-weight:700;color:var(--ink);}
  .vsrc{font-family:'Space Mono';font-size:10px;color:var(--faint);letter-spacing:.03em;margin-top:5px;}
  /* category details block */
  .det-card .bh{margin:0 0 14px;}
  .det{display:flex;align-items:baseline;gap:13px;padding:13px 0;border-top:1px solid var(--line2);}
  .det:first-of-type{border-top:none;padding-top:0;}
  .det b{font-family:'Archivo';font-weight:900;font-size:30px;line-height:.95;color:var(--ink);min-width:52px;text-align:right;}
  .det .dl{font-size:13.5px;color:var(--muted);line-height:1.32;}
  .det.tav b{color:var(--accent);}
  .det.tav .dl b{display:inline;font-size:inherit;min-width:0;}
  .src-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;padding-top:15px;border-top:1px solid var(--line);}
  .src-chips .lab{flex-basis:100%;font-family:'Space Mono';font-size:9.5px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-bottom:2px;}
  .src-chip{font-family:'Space Mono';font-size:10.5px;font-weight:700;color:var(--muted);background:var(--stone-b);padding:4px 9px;border-radius:999px;}
  .src-chip.tav{color:var(--accent);background:var(--accent-tint);}
  @media(max-width:1240px){
    .krow{grid-template-columns:1fr;gap:24px;}
    .knews,.kmid{position:static;}
  }

  footer{max-width:1680px;margin:50px auto 0;padding:40px;border-top:1px solid var(--line);text-align:center;font-family:'Space Mono';font-size:12px;color:var(--faint);letter-spacing:.06em;}

  @media(max-width:980px){
    .lead-grid,.feat-grid{grid-template-columns:1fr;gap:30px;}
    .side{position:static;flex-direction:row;flex-wrap:wrap;}
    .side .box{flex:1;min-width:240px;}
    .mast h1{font-size:58px;}
    .lead h2{font-size:38px;}.feat h3{font-size:27px;}
    .lead-hero image-slot{height:340px;}
    .cards{grid-template-columns:1fr;}
    .brief-grid{columns:1;}
  }
  @media(max-width:560px){
    .wrap,.util-in,.mast,.sol,.secdiv,.secsum,.lead,.feat,footer{padding-left:18px;padding-right:18px;}
    .mast h1{font-size:42px;}.article p{font-size:18px;}
    .wx{gap:8px 0;}
  }

  /* ── Tweaks panel ── */
  #tweaks{position:fixed;right:20px;bottom:20px;z-index:60;width:268px;background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.16);padding:16px 16px 18px;display:none;font-family:'Space Grotesk',sans-serif;}
  #tweaks.on{display:block;}
  #tweaks .tw-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
  #tweaks .tw-t{font-family:'Space Mono';font-size:11px;letter-spacing:.16em;font-weight:700;color:var(--muted);}
  #tweaks .tw-x{cursor:pointer;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--faint);border:1px solid var(--line);background:none;font-size:14px;line-height:1;}
  #tweaks .tw-x:hover{color:var(--ink);}
  #tweaks .tw-lab{font-family:'Space Mono';font-size:9.5px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin:0 0 9px;}
  .sch-grid{display:flex;flex-direction:column;gap:7px;max-height:62vh;overflow-y:auto;padding-right:4px;margin:0 -2px;}
  .sch-grid::-webkit-scrollbar{width:7px;}
  .sch-grid::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .sch-gh{font-family:'Space Mono';font-size:9px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;padding:8px 2px 2px;}
  .sch-gh:first-child{padding-top:0;}
  .sch{display:flex;align-items:center;gap:11px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:border-color .12s,background .12s;}
  .sch:hover{background:var(--accent-tint);}
  .sch.sel{border-color:var(--ink);}
  .sch .sw{width:26px;height:26px;border-radius:7px;flex:0 0 auto;position:relative;border:1px solid rgba(0,0,0,.12);}
  .sch .sw i{position:absolute;right:3px;bottom:3px;width:9px;height:9px;border-radius:2px;}

const K = window.KRANT;
const $ = (h) => { const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild; };

const STAR = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 22l-2.5-8.5L3 11l6.5-2.5z"/></svg>';

function ratingEl(){
  const r = $(`<div class="rating"><span class="rl">JOUW OORDEEL</span><div class="seg"></div></div>`);
  const seg = r.querySelector('.seg');
  for(let i=-2;i<=2;i++){ const b=document.createElement('b'); b.dataset.v=i;
    b.onclick=()=>{ [...seg.children].forEach(c=>{c.className=''; const v=+c.dataset.v;
      if(v<0&&v>=i&&i<0)c.classList.add('neg'); if(v>0&&v<=i&&i>0)c.classList.add('pos'); if(i===0)c.className=''; }); };
    seg.appendChild(b); }
  return r;
}
function threadEl(v){
  return $(`<div class="thread"><div class="deel">DEEL<b>${v.deel}</b></div>
    <div class="desc"><span class="lab">VERHAALLIJN</span><span class="tt">${esc(v.thread)}</span></div></div>`);
}
function vooruitEl(v){
  return $(`<div class="vooruit"><div class="top"><span class="ic">${FWD}</span>
    <span class="ti">VOORUITBLIK</span><span class="dt">${v.date}</span></div>
    <div class="bd"><p>${esc(v.text)}</p><span class="certchip cert-${v.certainty}">${v.certainty}</span></div></div>`);
}
function ripplesEl(rs){
  if(!rs||!rs.length) return null;
  const w = $(`<div><div class="ripples-h">GEVOLGEN · ${rs.length}</div><div class="ripples"></div></div>`);
  const box = w.querySelector('.ripples');
  rs.forEach((r,i)=> box.appendChild($(`<div class="ripple"><span class="rn">0${i+1}</span>
    <div><div class="rl">${esc(r.label)}</div><div class="rt">${esc(r.text)}</div></div></div>`)));
  return w;
}
function imgOrHatch(id, has, label){
  return has ? $(`<div class="featimg"><image-slot id="${id}" shape="rounded" radius="16" placeholder="Sleep een foto"></image-slot></div>`)
             : $(`<div class="hatch"><span>${label}</span></div>`);

function metaEl(a){

    <span>${a.match}% match</span><span class="dot"></span></div>`);

}

function timelineCard(a){
  const t = KE.deriveTimeline(a);
  const card = $(`<div class="box tl-card"></div>`);
  card.appendChild($(`<div class="bh-row"><span class="bh">VERHAALLIJN</span><span class="dur">${KE.durationLabel(t)}</span></div>`));
  card.appendChild($(`<div class="tl-stat"><b>${t.parts}</b> ${t.parts===1?'deel':'delen'}${t.days>0?` · sinds ${KE.fmt(t.start)}`:''}</div>`));
  const tl = $(`<div class="tl"></div>`);
  t.nodes.forEach(n=>{
    const isNow = n.kind==='now';
    const row = $(`<div class="tn ${isNow?'now':'past'}"><span class="tdot"></span><div class="tmeta"></div></div>`);
    const meta = row.querySelector('.tmeta');
    meta.appendChild($(`<span class="tdate">${KE.fmt(n.date)}</span>`));
    meta.appendChild($(`<span class="tlab">deel ${n.deel}${isNow?' · vandaag':''}</span>`));
    if(isNow) meta.appendChild($(`<span class="tthread">${esc(a.verhaallijn.thread)}</span>`));
    tl.appendChild(row);
  });
  if(t.future){
    const row = $(`<div class="tn future"><span class="tdot"></span><div class="tmeta"></div></div>`);
    const meta = row.querySelector('.tmeta');
    meta.appendChild($(`<span class="tdate">${KE.fmt(t.future.date)} · vooruitblik</span>`));
    meta.appendChild($(`<span class="cc cert-${t.future.certainty}">${t.future.certainty}</span>`));
    meta.appendChild($(`<span class="tthread">${esc(t.future.text)}</span>`));
    tl.appendChild(row);
  }
  card.appendChild(tl);
  return card;
}
function mapCard(a, sectionName){
  const impact = KE.deriveCountries(a, sectionName);
  const pins = KE.impactPins(impact);
  const card = $(`<div class="box map-card"></div>`);
  card.appendChild($(`<span class="bh">WAAR HET SPEELT</span>`));
  const mw = $(`<div class="mapwrap"></div>`);
  mw.innerHTML = KE.worldMapSVG({regions: impact.regions, pins, accent:'var(--accent)', ocean:'var(--map-ocean)', land:'var(--map-land)'});
  card.appendChild(mw);
  const chips = $(`<div class="chips"></div>`);
  impact.countries.forEach(c=> chips.appendChild($(`<span class="geo-chip">${esc(c)}</span>`)));
  card.appendChild(chips);
  return card;
}
function sideEl(a, sectionName){
  const side = $(`<aside class="side"></aside>`);
  side.appendChild(timelineCard(a));
  side.appendChild(mapCard(a, sectionName));
  return side;
}

function vrailEl(sectionName, primaryArticle){
  const sl = STORYLINES[sectionName];
  const rail = $(`<div class="vrail"></div>`);
  if(!sl){
    rail.appendChild($(`<div class="vrail-top"><div class="vrail-lab">VERHAALLIJN · ${esc(sectionName.toUpperCase())}</div>
      <div class="vrail-th">${esc(sectionName)}</div></div>`));
    return rail;
  }
  const srcCount = new Set(sl.nodes.map(n=>n.src)).size;
  rail.appendChild($(`<div class="vrail-top">
    <div class="vrail-lab">VERHAALLIJN · ${esc(sectionName.toUpperCase())}</div>
    <div class="vrail-th">${esc(sl.title)}</div>
    <div class="vrail-stat">
      <div class="s"><b>${sl.nodes.length}</b><span>delen</span></div>
      <div class="s"><b>${sl.weeks}</b><span>weken</span></div>
      <div class="s"><b>${srcCount}</b><span>bronnen</span></div>
    </div></div>`));
  const tl = $(`<div class="vtl"></div>`);
  const render = (n, future)=>{
    const row = $(`<div class="vn ${future?'future':(n.now?'now':'past')}"><span class="vdot"></span><div class="vmeta"></div></div>`);
    const m = row.querySelector('.vmeta');
    m.appendChild($(`<div class="vtop"><span class="vdate">${n.date}</span><span class="vtag ${n.cls}">${n.tag}</span></div>`));
    m.appendChild($(`<div class="vtitle">${esc(n.title)}</div>`));
    m.appendChild($(`<div class="vsrc">${esc(n.src)}</div>`));
    tl.appendChild(row);
  };
  sl.nodes.forEach(n=> render(n,false));
  if(sl.future) render(sl.future, true);
  rail.appendChild(tl);
  return rail;
}

function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function detailsCard(s, si){
  const articleCount = (si===0?1:0) + (s.featured?(s.featured.length):0) + (s.cards?s.cards.length:0) + (s.brief?s.brief.length:0) + (s.briefMore||0);
  const sources = new Set();
  if(si===0 && K.lead.source) sources.add(K.lead.source);
  (s.featured||[]).forEach(a=> a.source && sources.add(a.source));
  (s.cards||[]).forEach(c=> c.source && sources.add(c.source));
  (s.brief||[]).forEach(b=> b.source && sources.add(b.source));
  const srcList = [...sources];
  const tavily = 4 + (hashStr(s.name) % 13); // 4..16 aanvullende bronnen

  const card = $(`<div class="box det-card"></div>`);
  card.appendChild($(`<span class="bh">RUBRIEK IN CIJFERS</span>`));
  card.appendChild($(`<div class="det"><b>${articleCount}</b><div class="dl">artikelen in deze rubriek</div></div>`));
  card.appendChild($(`<div class="det"><b>${srcList.length}</b><div class="dl">verschillende bronnen geraadpleegd</div></div>`));
  card.appendChild($(`<div class="det tav"><b>+${tavily}</b><div class="dl">extra bronnen verzameld via <b>Tavily</b></div></div>`));
  const chips = $(`<div class="src-chips"><span class="lab">Bronnen in deze rubriek</span></div>`);
  srcList.slice(0,8).forEach(src=> chips.appendChild($(`<span class="src-chip">${esc(src)}</span>`)));
  chips.appendChild($(`<span class="src-chip tav">+${tavily} via Tavily</span>`));
  card.appendChild(chips);
  return card;
}

// ── render: one row per category, articles left, that category's verhaallijn right ──
K.sections.forEach((s, si)=>{
  const row = $(`<section class="krow"></section>`);
  const main = $(`<div class="kmain"></div>`);
  const mid = $(`<aside class="kmid"></aside>`);
  const rail = $(`<aside class="knews"></aside>`);
  row.appendChild(main); row.appendChild(mid); row.appendChild(rail);
  app.appendChild(row);

  // the lead leads the first category (Tech)
  if(si===0){
    const L = K.lead;
    const lead = $(`<section class="lead"></section>`);
    lead.appendChild($(`<span class="leadtag"><span class="pct">HOOFDVERHAAL · ${L.match}%</span> ${esc(L.section)} · ${esc(L.source)}</span>`));
    lead.appendChild($(`<h2>${esc(L.headline)}</h2>`));
    lead.appendChild($(`<div class="lead-hero"><image-slot id="lead-hero" shape="rounded" radius="18" placeholder="Sleep de hoofdfoto"></image-slot></div>`));
    const art = $(`<div class="article lead-body"></div>`);
    art.appendChild(threadEl(L.verhaallijn));
    art.appendChild(metaEl(L));
    L.body.forEach(p=> art.appendChild($(`<p>${esc(p)}</p>`)));
    const rp = ripplesEl(L.ripples); if(rp) art.appendChild(rp);
    lead.appendChild(art);
    main.appendChild(lead);
  }

  main.appendChild($(`<div class="secdiv"><span class="nm">${esc(s.name)}</span><span class="ln"></span><span class="ct">${esc(s.caption)}</span></div>`));
  main.appendChild($(`<div class="secsum"><p>${esc(s.summary)}</p></div>`));

  s.featured.forEach((a, ai)=>{
    const feat = $(`<section class="feat"></section>`);
    feat.appendChild(imgOrHatchWrap(a, si, ai));
    feat.appendChild($(`<h3>${esc(a.headline)}</h3>`));
    const art = $(`<div class="article"></div>`);
    art.appendChild(metaEl(a));
    a.body.forEach(p=> art.appendChild($(`<p>${esc(p)}</p>`)));
    const rp = ripplesEl(a.ripples); if(rp) art.appendChild(rp);
    feat.appendChild(art);
    main.appendChild(feat);
  });

  if(s.cards && s.cards.length){
    const cards = $(`<div class="cards"></div>`);
    s.cards.forEach(c=> cards.appendChild($(`<div class="scard"><div class="sh">${esc(c.headline)}</div>
      <div class="sb">${esc(c.body)}</div><div class="ss">${esc(c.source)}</div></div>`)));
    main.appendChild(cards);
  }

  const primary = si===0 ? K.lead : (s.featured[0]||null);
  if(primary) mid.appendChild(mapCard(primary, s.name));
  mid.appendChild(detailsCard(s, si));
  rail.appendChild(vrailEl(s.name, primary));
});

function imgOrHatchWrap(a, si, ai){
  return imgOrHatch(`feat-${si}-${ai}`, a.hasImage, esc(a.source));
}

function applyScheme(id){
  const s = SCHEMES.find(x=>x.id===id) || SCHEMES[0];
  const root = document.documentElement;
  Object.entries(s.vars).forEach(([k,v])=> root.style.setProperty(k,v));
  TWEAKS.scheme = s.id;
  document.querySelectorAll('.sch').forEach(el=> el.classList.toggle('sel', el.dataset.id===s.id));
}

// build the swatch list
(function(){
  const grid = document.getElementById('schGrid');
  let lastGroup = null;
  SCHEMES.forEach(s=>{
    if(s.group !== lastGroup){ grid.appendChild($(`<div class="sch-gh">${s.group}</div>`)); lastGroup = s.group; }
    const row = $(`<div class="sch" data-id="${s.id}"><span class="sw" style="background:${s.dark?s.vars['--paper']:'#fff'}"><i style="background:${s.sw}"></i></span><span class="nm">${s.name}</span></div>`);
    row.onclick = ()=>{ applyScheme(s.id); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{scheme:s.id}}, '*'); };
    grid.appendChild(row);
  });
  applyScheme(TWEAKS.scheme);
})();

// Tweaks host protocol
const twPanel = document.getElementById('tweaks');
window.addEventListener('message', (e)=>{
  const t = e.data && e.data.type;
  if(t==='__activate_edit_mode') twPanel.classList.add('on');
  else if(t==='__deactivate_edit_mode') twPanel.classList.remove('on');
});
document.getElementById('twClose').onclick = ()=>{
  twPanel.classList.remove('on');
  window.parent.postMessage({type:'__edit_mode_dismissed'}, '*');
};
window.parent.postMessage({type:'__edit_mode_available'}, '*');
</script>
